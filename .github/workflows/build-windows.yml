name: Build Windows Device Bridge

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/windows/**"
      - "scripts/**"
      - ".github/workflows/build-windows.yml"

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Windows installer into downloads
        shell: pwsh
        run: ./scripts/build-windows.ps1

      - name: Upload Windows downloads
        uses: actions/upload-artifact@v4
        with:
          name: Biz-Suite-Device-Bridge-Windows
          path: downloads/windows/*
