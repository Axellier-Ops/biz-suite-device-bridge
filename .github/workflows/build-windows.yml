name: Build Windows Cloud POS Shell

on:
  workflow_dispatch:
  push:
    tags:
      - "cloud-pos-windows-v*"
  pull_request:
    paths:
      - "**"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Cloud POS installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Windows installer into downloads
        shell: pwsh
        run: ./scripts/build-windows.ps1

      - name: Upload Windows downloads
        uses: actions/upload-artifact@v4
        with:
          name: Biz-Suite-Cloud-POS-Windows
          path: downloads/windows/Biz-Suite-Cloud-POS-Windows-*.exe

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/cloud-pos-windows-v')
        uses: softprops/action-gh-release@v2
        with:
          name: Biz Suite Cloud POS Windows ${{ github.ref_name }}
          files: downloads/windows/Biz-Suite-Cloud-POS-Windows-*.exe
          body: |
            Windows installer for Biz Suite Cloud POS.

            Includes receipt logo/footer rendering updates.
